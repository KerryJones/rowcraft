name: rowcraft
description: "RowCraft - Structured rowing workouts for Concept2"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  supabase_flutter: ^2.5.0
  flutter_reactive_ble: ^5.3.1
  permission_handler: ^11.3.0
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  intl: ^0.19.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0
  google_fonts: ^6.2.0
  flutter_svg: ^2.0.0
  http: ^1.2.0
  url_launcher: ^6.3.0
  path: ^1.9.0
  google_sign_in: ^6.2.1
  sentry_flutter: ^9.3.0
  flutter_native_splash: ^2.4.0
  wakelock_plus: ^1.2.0
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  drift_dev: ^2.18.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.0

flutter_native_splash:
  color: "#000000"
  image: "assets/app_icon.png"
  android: true
  ios: false
  android_12:
    color: "#000000"
    image: "assets/splash_icon_android12.png"

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/

