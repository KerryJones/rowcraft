name: rowcraft
description: "RowCraft - Structured rowing workouts for Concept2"
publish_to: 'none'
version: 0.3.0+10

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: '>=3.32.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.0.0
  go_router: ^17.0.0
  supabase_flutter: ^2.5.0
  flutter_reactive_ble: ^5.4.0
  permission_handler: ^12.0.0
  drift: ^2.32.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  intl: ^0.20.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.11.0
  google_fonts: ^8.0.0
  flutter_svg: ^2.0.0
  http: ^1.2.0
  url_launcher: ^6.3.0
  path: ^1.9.0
  google_sign_in: ^7.0.0
  sentry_flutter: ^9.17.0
  flutter_native_splash: ^2.4.0
  wakelock_plus: ^1.6.0
  sound_effect: ^0.1.3
  app_links: ^7.0.0
  syncfusion_flutter_gauges: ^33.0.0
  flutter_timezone: ^4.1.1
  package_info_plus: ^10.0.0
  device_info_plus: ^13.0.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.0
  drift_dev: ^2.32.0
  freezed: ^3.2.0
  json_serializable: ^6.13.0
  flutter_launcher_icons: ^0.14.0

flutter_native_splash:
  color: "#000000"
  image: "assets/app_icon.png"
  android: true
  ios: false
  android_12:
    color: "#000000"
    image: "assets/splash_icon_android12.png"

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/audio/

