<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Stylized "RC" monogram with rowing oar diagonal -->
  <g fill="white">
    <!-- Bold diagonal oar stroke — the dominant mark -->
    <rect x="130" y="100" width="36" height="340" rx="18" transform="rotate(-30, 256, 256)"/>
    <!-- Oar blade at bottom-left -->
    <ellipse cx="138" cy="378" rx="32" ry="18" transform="rotate(-30, 138, 378)"/>
    <!-- Two horizontal bars suggesting water/lanes -->
    <rect x="180" y="220" width="240" height="20" rx="10" opacity="0.7"/>
    <rect x="200" y="270" width="200" height="20" rx="10" opacity="0.5"/>
    <!-- Small dot — oar handle grip -->
    <circle cx="374" cy="134" r="18"/>
  </g>
</svg>
